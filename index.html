<!DOCTYPE html>
<html>
<head>
  <title>Fila Inteligente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px; padding: 10px; }
    .card { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Entrar na fila</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="pedido" placeholder="Pedido">
<button onclick="entrar()">Entrar</button>

<h2>Fila</h2>
<div id="fila"></div>

<h2>Admin</h2>
<button onclick="chamar()">Chamar próximo</button>
<button onclick="toggleFila()">Abrir/Fechar fila</button>

<script>
let fila = [];
let bloqueados = [];
let travada = false;

function entrar(){
  if(travada){
    alert("Fila está fechada");
    return;
  }

  let nome = document.getElementById("nome").value;
  let telefone = document.getElementById("telefone").value;
  let pedido = document.getElementById("pedido").value;

  if(bloqueados.includes(telefone)){
    alert("Número bloqueado");
    return;
  }

  fila.push({nome, telefone, pedido});
  render();
}

function chamar(){
  if(fila.length === 0) return;

  let pessoa = fila.shift();

  alert("Chamando " + pessoa.nome + " no WhatsApp: " + pessoa.telefone);

  render();
}

function toggleFila(){
  travada = !travada;
  alert(travada ? "Fila fechada" : "Fila aberta");
}

function render(){
  let div = document.getElementById("fila");
  div.innerHTML = "";

  fila.forEach((p, i)=>{
    div.innerHTML += `
      <div class="card">
        ${i+1}. ${p.nome} - ${p.telefone}<br>
        Pedido: ${p.pedido}
        <br>
        <button onclick="passar(${i})">Passar vez</button>
        <button onclick="bloquear('${p.telefone}')">Bloquear</button>
      </div>
    `;
  });
}

function passar(i){
  let item = fila.splice(i,1)[0];
  fila.push(item);
  render();
}

function bloquear(tel){
  bloqueados.push(tel);
  alert("Bloqueado");
}
</script>

</body>
</html>
